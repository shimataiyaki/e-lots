<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽選中ポップアップ｜e-mikuji</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: '游明朝', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: #ad241f;
            margin-bottom: 2rem;
        }

        .cards-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 2rem;
        }

        .omikuji-card {
            width: 90px;
            height: 140px;
            background-color: transparent;
            color: #1f2937;
            border: 2px solid #ad241f;
            box-shadow: 4px 4px 0 rgba(105, 105, 105, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 22px;
            font-weight: 600;
            user-select: none;
        }

        .omikuji-card:hover {
            transform: translateY(-4px);
            box-shadow: 6px 6px 0 rgba(105, 105, 105, 0.12);
        }

        .omikuji-card.disabled {
            opacity: 0.4;
            pointer-events: none;
            transform: translateY(2px);
            box-shadow: 2px 2px 0 rgba(105, 105, 105, 0.08);
        }

        /* ポップアップ */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.2);
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #ffffff;
            border: none;
            border-radius: 40px;
            padding: 2rem 2rem 2.5rem;
            max-width: 550px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 24px;
            font-size: 36px;
            color: #1f2937;
            cursor: pointer;
        }

        .modal-title {
            font-size: 1.4rem;
            color: #ad241f;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.75rem;
        }

        .modal-number {
            font-family: '游明朝', serif;
            font-size: 80px;
            font-weight: 600;
            line-height: 1.3;
            margin: 0.5rem 0 0.25rem;
            writing-mode: vertical-rl;
            text-orientation: upright;
            display: inline-block;
            min-height: 120px;
        }

        .modal-unit {
            font-size: 1.5rem;
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        .modal-guide {
            font-size: 1rem;
            color: #1f2937;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>デジタルおみくじ</h1>
    <div class="cards-grid" id="cardsGrid">
        <div class="omikuji-card">おみくじ</div>
        <div class="omikuji-card">おみくじ</div>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <div class="modal-title" id="modalTitle">抽選中</div>
            <div id="modalNumber" class="modal-number"></div>
            <div id="modalUnit" class="modal-unit"></div>
            <div id="modalGuide" class="modal-guide"></div>
        </div>
    </div>
</div>

<script>
    const NUMBER_LIST = ["一","二","三","五","六","七","八","九","十","十一","十二","十三","十五","十六","十七","十八"];
    const WAIT_TIME = 2500;

    const modal = document.getElementById('resultModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalNumber = document.getElementById('modalNumber');
    const modalUnit = document.getElementById('modalUnit');
    const modalGuide = document.getElementById('modalGuide');
    const modalClose = document.getElementById('modalClose');

    let isDrawing = false;
    let timeoutId = null;

    document.querySelectorAll('.omikuji-card').forEach(card => {
        card.addEventListener('click', () => {
            if (isDrawing) return;
            startDrawing(card);
        });
    });

    function startDrawing(card) {
        isDrawing = true;
        document.querySelectorAll('.omikuji-card').forEach(c => c.classList.add('disabled'));

        // 抽選中モーダルを表示
        modalTitle.textContent = '抽選中';
        modalNumber.textContent = '・・・';
        modalUnit.textContent = '';
        modalGuide.textContent = '';
        modal.classList.add('show');

        const selected = NUMBER_LIST[Math.floor(Math.random() * NUMBER_LIST.length)];

        timeoutId = setTimeout(() => {
            // 結果に切り替え
            modalTitle.textContent = '抽選結果';
            modalNumber.textContent = selected;
            modalUnit.textContent = '番';
            modalGuide.textContent = '▶ 表示された数字を部員に見せて、おみくじの紙を受け取ってください。';
            timeoutId = null;
        }, WAIT_TIME);
    }

    function resetEverything() {
        if (timeoutId) { clearTimeout(timeoutId); timeoutId = null; }
        isDrawing = false;
        document.querySelectorAll('.omikuji-card').forEach(c => c.classList.remove('disabled'));
        modal.classList.remove('show');
    }

    modalClose.addEventListener('click', resetEverything);
    modal.addEventListener('click', e => { if (e.target === modal) resetEverything(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') resetEverything(); });
</script>
</body>
</html>
